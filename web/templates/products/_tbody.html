{{define "products_tbody"}}
<tbody id="products-tbody">
  {{range .Products}}
    <tr>
      <td>{{.Category}}</td>
      <td>{{.Name}}</td>
      <td class="num">{{.StockQty}}</td>
      <td class="num">{{currency .PurchasePrice}}</td>
      <td class="num">{{currency .SalePrice}}</td>
      <td class="num">{{currency .StockAmount}}</td>
      <td>
        <div class="btn-row">
          <button class="secondary outline"
                  hx-get="/products/{{.ID}}/edit"
                  hx-target="#modal-body"
                  hx-swap="innerHTML">
            수정
          </button>
          <button class="contrast outline"
                  hx-delete="/products/{{.ID}}"
                  hx-target="#products-tbody"
                  hx-swap="outerHTML"
                  hx-confirm="'{{.Name}}' 을(를) 정말 삭제하시겠습니까?">
            삭제
          </button>
        </div>
      </td>
    </tr>
  {{else}}
    <tr>
      <td colspan="7" style="text-align: center; padding: 2rem;">
        <em>등록된 품목이 없습니다. '신규 등록' 버튼으로 추가해주세요.</em>
      </td>
    </tr>
  {{end}}
</tbody>
{{end}}
